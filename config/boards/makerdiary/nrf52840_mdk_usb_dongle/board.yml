# ZMK board extension for the Makerdiary nRF52840 MDK USB Dongle.
#
# Extends the Zephyr upstream board definition (boards/makerdiary/nrf52840_mdk_usb_dongle)
# with a //zmk variant, enabling ZMK's compat check and build system to accept this board.
#
# Reference: app/boards/nordic/nrf52840dongle/board.yml in zmkfirmware/zmk

board:
  extend: nrf52840_mdk_usb_dongle
  variants:
    - name: zmk
      qualifier: nrf52840
