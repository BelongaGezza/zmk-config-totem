# ── totem_dongle.conf ────────────────────────────────────────────────────────
# Mode 1: Makerdiary nRF52840 MDK USB Dongle as USB-HID central.
#
# CONFIG_ZMK_USB, CONFIG_ZMK_BLE, and CONFIG_BUILD_OUTPUT_UF2 are set in
# the board defconfig (nrf52840_mdk_usb_dongle_nrf52840_zmk_defconfig).
# Only shield-specific overrides belong here.

# Suppress USB serial logging in production firmware.
CONFIG_ZMK_USB_LOGGING=n
